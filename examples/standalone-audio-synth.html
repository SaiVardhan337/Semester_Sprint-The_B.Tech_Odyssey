<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standalone Web Audio API Chiptune Synth - B.Tech Runner</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e222a;
            color: #eceff4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #2e3440;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }
        h1 { color: #88c0d0; margin-top: 0; }
        p { color: #d8dee9; font-size: 14px; line-height: 1.6; }
        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        button {
            background: #4c566a;
            color: #fff;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #81a1c1;
            transform: translateY(-2px);
        }
        button.active {
            background: #a3be8c;
            color: #2e3440;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🎹 Web Audio Chiptune Synth</h1>
        <p>This standalone demo showcases the Web Audio API audio engine built for <strong>Semester Sprint: The B.Tech Odyssey</strong>. No audio files are loaded — all sounds are synthesized live in JavaScript!</p>

        <div class="btn-grid">
            <button id="bgm-btn" onclick="toggleBGM()">▶ Toggle BGM</button>
            <button onclick="playJump()">🦘 Jump SFX</button>
            <button onclick="playCollect()">✨ Collect SFX</button>
            <button onclick="playHit()">💥 Hit SFX</button>
        </div>
    </div>

    <script>
        // Minimal Web Audio API Synthesizer Class
        class MinimalSynth {
            constructor() {
                this.ctx = null;
                this.bgmInterval = null;
                this.seqIndex = 0;
                this.isPlayingBGM = false;
                
                // Chiptune melody notes (in Hz)
                this.melody = [
                    440.00, 440.00, 523.25, 587.33, 659.25, 659.25, 783.99, 783.99,
                    587.33, 587.33, 523.25, 523.25, 440.00, 440.00, 392.00, 392.00
                ];
            }

            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }

            playJump() {
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(600, now + 0.15);
                
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.15);
            }

            playCollect() {
                this.init();
                const now = this.ctx.currentTime;
                const notes = [523.25, 659.25, 783.99]; // C5, E5, G5 arpeggio
                notes.forEach((freq, idx) => {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    const noteTime = now + idx * 0.06;
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, noteTime);
                    gain.gain.setValueAtTime(0.1, noteTime);
                    gain.gain.linearRampToValueAtTime(0.01, noteTime + 0.1);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(noteTime);
                    osc.stop(noteTime + 0.1);
                });
            }

            playHit() {
                this.init();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, now);
                osc.frequency.linearRampToValueAtTime(40, now + 0.2);
                
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            }

            toggleBGM() {
                this.init();
                const btn = document.getElementById('bgm-btn');
                if (this.isPlayingBGM) {
                    clearInterval(this.bgmInterval);
                    this.isPlayingBGM = false;
                    btn.textContent = '▶ Toggle BGM';
                    btn.classList.remove('active');
                } else {
                    this.isPlayingBGM = true;
                    btn.textContent = '⏸ Pause BGM';
                    btn.classList.add('active');
                    this.bgmInterval = setInterval(() => {
                        const freq = this.melody[this.seqIndex % this.melody.length];
                        this.seqIndex++;
                        if (freq > 0) {
                            const now = this.ctx.currentTime;
                            const osc = this.ctx.createOscillator();
                            const gain = this.ctx.createGain();
                            osc.type = 'triangle';
                            osc.frequency.setValueAtTime(freq, now);
                            gain.gain.setValueAtTime(0.05, now);
                            gain.gain.linearRampToValueAtTime(0.005, now + 0.18);
                            osc.connect(gain);
                            gain.connect(this.ctx.destination);
                            osc.start(now);
                            osc.stop(now + 0.18);
                        }
                    }, 200);
                }
            }
        }

        const synth = new MinimalSynth();
        function toggleBGM() { synth.toggleBGM(); }
        function playJump() { synth.playJump(); }
        function playCollect() { synth.playCollect(); }
        function playHit() { synth.playHit(); }
    </script>
</body>
</html>
